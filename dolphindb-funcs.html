<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>函数查找/总览 · DolphinDB 函数手册</title>
<style>
  :root{
    --bg:#F7F6F2; --surface:#F9F8F5; --surface-alt:#FBFBF9; --surface-2:#FBFBF9; --border:#D4D1CA;
    --text:#28251D; --muted:#7A7974; --faint:#BAB9B4;
    --primary:#01696F; --primary-h:#0C4E54; --primary-hover:#0C4E54; --primary-soft:#E2F0F0;
    --orig:#1A4FC4; --supp:#6B3FB5;
    --th-bg:#EFEDE6; --row-alt:#F2F0EA;
    --accent:#A84B2F; --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
    --radius:10px; --mono:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",Roboto,Helvetica,Arial,sans-serif;
  }
  html[data-theme="dark"]{
    --bg:#171614; --surface:#1C1B19; --surface-alt:#201F1D; --surface-2:#201F1D; --border:#393836;
    --text:#CDCCCA; --muted:#797876; --faint:#5A5957;
    --primary:#4F98A3; --primary-h:#6FB3BD; --primary-hover:#227F8B; --primary-soft:#1C3438;
    --orig:#6FA0F5; --supp:#B08CF0;
    --th-bg:#232220; --row-alt:#201F1D;
    --accent:#D88B6E; --shadow:0 1px 3px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);
       font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;}
  a{color:inherit;text-decoration:none;}

  /* Header */
  header{position:sticky;top:0;z-index:20;background:var(--surface);
         border-bottom:1px solid var(--border);box-shadow:var(--shadow);}
  .head-inner{max-width:1360px;margin:0 auto;padding:14px 20px;
              display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:17px;white-space:nowrap;}
  .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--primary);}
  .brand small{font-weight:500;color:var(--muted);font-size:12px;}
  .search-wrap{flex:1;min-width:240px;position:relative;}
  #search{width:100%;padding:11px 40px 11px 40px;font-size:15px;
          border:1px solid var(--border);border-radius:var(--radius);
          background:var(--surface-2);color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s;}
  #search:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft);}
  .search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--faint);pointer-events:none;}
  .kbd{position:absolute;right:11px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--faint);
       border:1px solid var(--border);border-radius:5px;padding:1px 6px;font-family:var(--mono);background:var(--surface);}
  .head-actions{display:flex;align-items:center;gap:10px;}
  .icon-btn{cursor:pointer;border:1px solid var(--border);background:var(--surface-2);color:var(--muted);
            border-radius:8px;padding:8px 10px;font-size:13px;display:flex;align-items:center;gap:6px;transition:.15s;}
  .icon-btn:hover{color:var(--primary);border-color:var(--primary);}
  .stat{color:var(--muted);font-size:13px;white-space:nowrap;}

  /* Layout */
  .layout{max-width:1360px;margin:0 auto;display:grid;grid-template-columns:248px 1fr;gap:24px;padding:20px;}
  aside{position:sticky;top:78px;align-self:start;max-height:calc(100vh - 98px);overflow-y:auto;
        padding-right:6px;}
  aside::-webkit-scrollbar{width:8px;} aside::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
  .side-title{font-size:12px;font-weight:700;letter-spacing:.04em;color:var(--muted);
              text-transform:uppercase;margin:4px 0 8px;padding-left:4px;}
  .board{margin-bottom:4px;}
  .board-head{display:flex;align-items:center;justify-content:space-between;gap:8px;
              padding:8px 10px;border-radius:8px;cursor:pointer;font-weight:600;font-size:14px;
              transition:background .12s;}
  .board-head:hover{background:var(--surface-2);}
  .board-head.active{background:var(--primary-soft);color:var(--primary);}
  .board-head .cnt{font-size:11px;color:var(--faint);font-weight:500;font-family:var(--mono);}
  .board-head .arrow{transition:transform .15s;color:var(--faint);font-size:11px;}
  .board.open .arrow{transform:rotate(90deg);}
  .subs{display:none;margin:2px 0 6px 8px;border-left:1px solid var(--border);padding-left:6px;}
  .board.open .subs{display:block;}
  .sub{padding:5px 10px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--muted);
       display:flex;justify-content:space-between;gap:8px;transition:.12s;}
  .sub:hover{background:var(--surface-2);color:var(--text);}
  .sub.active{background:var(--primary);color:#fff;}
  .sub.active .cnt{color:rgba(255,255,255,.7);}
  .sub .cnt{font-size:11px;color:var(--faint);font-family:var(--mono);}
  .reset{margin:6px 0 14px;}

  /* Main */
  main{min-width:0;}
  .toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap;}
  .crumb{font-size:14px;color:var(--muted);}
  .crumb b{color:var(--text);}
  .alpha{display:flex;flex-wrap:wrap;gap:3px;}
  .alpha a{font-size:11px;font-family:var(--mono);color:var(--muted);padding:3px 6px;border-radius:5px;cursor:pointer;}
  .alpha a:hover{background:var(--primary-soft);color:var(--primary);}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
        padding:13px 15px;box-shadow:var(--shadow);transition:transform .12s,border-color .12s,box-shadow .12s;
        display:flex;flex-direction:column;gap:7px;position:relative;}
  .card:hover{transform:translateY(-2px);border-color:var(--primary);box-shadow:0 4px 14px rgba(0,0,0,.08);}
  .card .fn{font-family:var(--mono);font-size:15px;font-weight:600;color:var(--primary);
            word-break:break-all;display:flex;align-items:center;gap:6px;}
  .card .fn .ext{opacity:0;transition:opacity .12s;font-size:12px;color:var(--faint);}
  .card:hover .fn .ext{opacity:1;}
  .card .desc{font-size:12.5px;color:var(--muted);line-height:1.5;}
  .card .tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:auto;}
  .tag{font-size:10.5px;background:var(--surface-2);border:1px solid var(--border);color:var(--muted);
       border-radius:20px;padding:2px 9px;cursor:pointer;transition:.12s;}
  .tag:hover{border-color:var(--primary);color:var(--primary);}
  .tag.board{background:var(--primary-soft);border-color:transparent;color:var(--primary);}
  mark{background:#FFE9A8;color:inherit;border-radius:3px;padding:0 1px;}
  html[data-theme="dark"] mark{background:#5c4a16;color:#ffe9a8;}
  .empty{text-align:center;padding:80px 20px;color:var(--muted);}
  .empty .big{font-size:42px;margin-bottom:10px;}
  footer{max-width:1360px;margin:0 auto;padding:20px;color:var(--faint);font-size:12px;line-height:1.7;border-top:1px solid var(--border);}
  footer a{color:var(--primary);}
  .sentinel{height:1px;}

  @media(max-width:880px){
    .layout{grid-template-columns:1fr;}
    aside{position:static;max-height:none;margin-bottom:8px;}
    .subs{max-height:200px;overflow-y:auto;}
  }
  /* cross-page nav strip */
  .xnav{position:sticky;top:0;z-index:30;background:var(--surface);border-bottom:1px solid var(--border);}
  .xnav-in{max-width:1360px;margin:0 auto;padding:8px 20px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .xnav .xbrand{font-weight:700;font-size:14px;margin-right:10px;white-space:nowrap;}
  .xnav .xbrand b{color:var(--primary);}
  .xnav a{padding:5px 11px;border-radius:8px;color:var(--muted);font-weight:500;font-size:13.5px;}
  .xnav a:hover{background:var(--surface-2);color:var(--text);}
  .xnav a.active{background:var(--primary);color:#fff;}
.xnav .xsep{width:1px;height:18px;background:var(--border);margin:0 4px;display:inline-block;}

  header{top:39px;}

.supp-badge{display:inline-flex;align-items:center;margin-left:2px;padding:0 5px;border-radius:6px;font-size:9px;height:15px;font-weight:700;color:#fff !important;background:var(--supp) !important;text-decoration:none;flex:0 0 auto;}
</style>
</head>

const FUNCS = DATA.map(d=>({name:d[0],url:d[1],board:d[2],subs:d[3],desc:d[4],lname:d[0].toLowerCase(),supp:SUPP_SET.has(d[0])}));
const TOTAL = FUNCS.length;

let state = {q:"", board:null, sub:null, alpha:null, limit:120};

const $ = s=>document.querySelector(s);
const grid=$("#grid"), nav=$("#nav"), crumb=$("#crumb"), stat=$("#stat"), alphaBox=$("#alpha"), searchEl=$("#search");

/* ---------- 侧边导航 ---------- */
function buildNav(){
  let html="";
  HIER.boards.forEach(b=>{
    const subs=HIER.hier[b]||[];
    const cnt=HIER.counts[b]||0;
    html+=`<div class="board" data-board="${esc(b)}">
      <div class="board-head" data-board="${esc(b)}">
        <span><span class="arrow">▶</span> ${esc(b)}</span><span class="cnt">${cnt}</span>
      </div>`;
    if(subs.length){
      html+=`<div class="subs">`;
      subs.forEach(s=>{
        html+=`<div class="sub" data-board="${esc(b)}" data-sub="${esc(s)}">${esc(s)}</div>`;
      });
      html+=`</div>`;
    }
    html+=`</div>`;
  });
  nav.innerHTML=html;

  nav.querySelectorAll(".board-head").forEach(el=>{
    el.addEventListener("click",()=>{
      const b=el.dataset.board;
      const boardDiv=el.parentElement;
      // 点击板块标题: 选中该板块 + 展开
      if(state.board===b && !state.sub){
        // 已选中再点 -> 收起并取消
        boardDiv.classList.remove("open");
        clearFilter();
      }else{
        nav.querySelectorAll(".board").forEach(d=>d.classList.remove("open"));
        boardDiv.classList.add("open");
        state.board=b; state.sub=null; state.alpha=null; state.limit=120;
        render();
      }
    });
  });
  nav.querySelectorAll(".sub").forEach(el=>{
    el.addEventListener("click",e=>{
      e.stopPropagation();
      state.board=el.dataset.board; state.sub=el.dataset.sub; state.alpha=null; state.limit=120;
      el.closest(".board").classList.add("open");
      render();
    });
  });
}
function syncNavActive(){
  nav.querySelectorAll(".board-head").forEach(el=>
    el.classList.toggle("active", el.dataset.board===state.board && !state.sub));
  nav.querySelectorAll(".sub").forEach(el=>
    el.classList.toggle("active", el.dataset.board===state.board && el.dataset.sub===state.sub));
}

/* ---------- 字母索引 ---------- */
function buildAlpha(){
  const letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
  let html=`<a data-a="">All</a>`;
  letters.forEach(L=>html+=`<a data-a="${L}">${L}</a>`);
  alphaBox.innerHTML=html;
  alphaBox.querySelectorAll("a").forEach(a=>a.addEventListener("click",()=>{
    state.alpha=a.dataset.a||null; state.limit=400; render();
  }));
}

/* ---------- 过滤 ---------- */
function filtered(){
  let arr=FUNCS;
  if(state.board) arr=arr.filter(f=>f.board===state.board);
  if(state.sub) arr=arr.filter(f=>f.subs.includes(state.sub));
  if(state.alpha) arr=arr.filter(f=>f.lname[0]===state.alpha.toLowerCase());
  const q=state.q.trim().toLowerCase();
  if(q){
    arr=arr.filter(f=>f.lname.includes(q) || (f.desc&&f.desc.toLowerCase().includes(q)));
    // 排序: 名称前缀匹配优先, 再名称包含, 再说明
    arr=arr.slice().sort((a,b)=>{
      const ap=a.lname.startsWith(q)?0:(a.lname.includes(q)?1:2);
      const bp=b.lname.startsWith(q)?0:(b.lname.includes(q)?1:2);
      if(ap!==bp)return ap-bp;
      return a.lname.localeCompare(b.lname);
    });
  }
  return arr;
}

/* ---------- 渲染 ---------- */
function esc(s){return (s+"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function hl(text,q){
  if(!q)return esc(text);
  const i=text.toLowerCase().indexOf(q.toLowerCase());
  if(i<0)return esc(text);
  return esc(text.slice(0,i))+"<mark>"+esc(text.slice(i,i+q.length))+"</mark>"+esc(text.slice(i+q.length));
}
function render(){
  syncNavActive();
  const all=filtered();
  const q=state.q.trim();
  // 面包屑
  let cb="全部函数";
  if(state.board) cb=`<b>${esc(state.board)}</b>`;
  if(state.sub) cb=`${esc(state.board)} › <b>${esc(state.sub)}</b>`;
  if(q) cb=(state.board?cb+" · ":"")+`搜索 "<b>${esc(q)}</b>"`;
  if(state.alpha) cb+=` · 首字母 <b>${state.alpha}</b>`;
  crumb.innerHTML=cb;
  stat.textContent=`${all.length} 个结果`;

  const show=all.slice(0,state.limit);
  if(!all.length){
    grid.innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="big">🔍</div>没有匹配的函数<br><span style="font-size:13px">试试更短的关键词，或点击「显示全部」</span></div>`;
    return;
  }
  let html="";
  show.forEach(f=>{
    const tags=[`<span class="tag board" data-board="${esc(f.board)}">${esc(f.board)}</span>`]
      .concat(f.subs.slice(0,3).map(s=>`<span class="tag" data-board="${esc(f.board)}" data-sub="${esc(s)}">${esc(s)}</span>`)).join("");
    const desc=f.desc?`<div class="desc">${hl(f.desc,q)}</div>`:"";
    html+=`<a class="card" href="${esc(f.url)}" target="_blank" rel="noopener" title="点击查看官方文档：${esc(f.name)}">
        <div class="fn">${hl(f.name,q)}${f.supp?'<sup class="supp-badge">补</sup>':''} <span class="ext">↗</span></div>
        ${desc}
        <div class="tags">${tags}</div>
      </a>`;
  });
  if(all.length>show.length){
    html+=`<div class="empty" style="grid-column:1/-1;padding:24px"><button class="icon-btn" id="moreBtn" style="margin:0 auto">还有 ${all.length-show.length} 个 · 加载更多</button></div>`;
  }
  grid.innerHTML=html;

  // tag 点击筛选
  grid.querySelectorAll(".tag").forEach(t=>t.addEventListener("click",e=>{
    e.preventDefault();e.stopPropagation();
    state.board=t.dataset.board; state.sub=t.dataset.sub||null; state.alpha=null; state.q=""; searchEl.value=""; state.limit=120;
    nav.querySelectorAll(".board").forEach(d=>d.classList.toggle("open",d.dataset.board===state.board));
    render();
    window.scrollTo({top:0,behavior:"smooth"});
  }));
  const mb=$("#moreBtn"); if(mb)mb.addEventListener("click",()=>{state.limit+=300;render();});
}

function clearFilter(){
  state={q:"",board:null,sub:null,alpha:null,limit:120};
  searchEl.value="";
  nav.querySelectorAll(".board").forEach(d=>d.classList.remove("open"));
  render();
}

/* ---------- 事件 ---------- */
let t;
searchEl.addEventListener("input",e=>{
  clearTimeout(t);
  t=setTimeout(()=>{ state.q=e.target.value; state.alpha=null; state.limit=120; render(); },120);
});
$("#resetBtn").addEventListener("click",clearFilter);
document.addEventListener("keydown",e=>{
  if(e.key==="/" && document.activeElement!==searchEl){e.preventDefault();searchEl.focus();}
  if(e.key==="Escape"){searchEl.blur(); if(state.q){state.q="";searchEl.value="";render();}}
});

// 主题
const themeBtn=$("#theme");
function setTheme(th){document.documentElement.dataset.theme=th;localStorage.setItem("ddb-theme",th);
  themeBtn.textContent=th==="dark"?"☀️ 主题":"🌙 主题";}
setTheme(localStorage.getItem("ddb-theme")|| (matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light"));
themeBtn.addEventListener("click",()=>setTheme(document.documentElement.dataset.theme==="dark"?"light":"dark"));

// 无限滚动
new IntersectionObserver(es=>{es.forEach(en=>{if(en.isIntersecting){const a=filtered();if(state.limit<a.length){state.limit+=200;render();}}})}).observe($("#sentinel"));

buildNav(); buildAlpha(); render();
</script>
